version: '3.8'

services:
  solveos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solveos-app
    ports:
      - "80:3000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: always
